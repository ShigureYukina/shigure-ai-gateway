name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify (tests + jacoco)
        run: mvn -B clean verify

      - name: Dependency vulnerability scan
        timeout-minutes: 20
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B org.owasp:dependency-check-maven:check -DdataDirectory=${{ github.workspace }}/.dependency-check-data -DnvdApiKey=${NVD_API_KEY}

      - name: Package
        run: mvn -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: shortlink-ai-gateway-jar
          path: target/shortlink-ai-gateway.jar

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
